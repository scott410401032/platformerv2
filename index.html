<style>
/* ── RESET & BASE ─────────────────────────────── */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#07070f;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Courier New',monospace;
  overflow:hidden; user-select:none;
}

/* ── TITLE ────────────────────────────────────── */
#title {
  color:#00ffe7; font-size:20px; letter-spacing:8px;
  text-shadow:0 0 10px #00ffe7,0 0 30px #00ffe780;
  animation:flicker 5s infinite;
}
@keyframes flicker {
  0%,94%,100%{opacity:1} 95%{opacity:.5} 96%{opacity:1} 98%{opacity:.3}
}

/* ── HUD ──────────────────────────────────────── */
#hud {
  display:flex; gap:18px; align-items:center;
  font-size:12px; letter-spacing:2px; flex-wrap:wrap; justify-content:center;
}
.hud-item { color:#555; }
.hud-val  { color:#00ffe7; text-shadow:0 0 8px #00ffe7; }

/* LIFE HEARTS */
#lives-bar { display:flex; gap:4px; align-items:center; }
.heart {
  width:16px; height:16px;
  background:#ff4466;
  clip-path:polygon(50% 90%,0 35%,15% 0,50% 20%,85% 0,100% 35%);
  box-shadow:0 0 6px #ff446680;
  transition:transform .2s, opacity .3s;
}
.heart.lost { opacity:.15; transform:scale(.7); }

/* HEALTH BAR */
#hp-wrap { display:flex; align-items:center; gap:6px; }
#hp-bar-outer {
  width:80px; height:8px;
  background:#1a1a2e; border:1px solid #00ffe740;
  border-radius:4px; overflow:hidden;
}
#hp-bar-inner {
  height:100%; width:100%;
  background:linear-gradient(90deg,#00ffe7,#7b2fff);
  border-radius:4px;
  transition:width .3s ease, background .3s;
  box-shadow:0 0 6px #00ffe7;
}
#hp-bar-inner.low  { background:linear-gradient(90deg,#ff6b35,#ff0050); box-shadow:0 0 8px #ff4400; }

/* STAGE INDICATOR */
#stage-ind { color:#7b2fff; text-shadow:0 0 8px #7b2fff; }

/* ── CANVAS ───────────────────────────────────── */
#canvas-wrap { position:relative; }
canvas {
  display:block;
  border:1px solid #00ffe740;
  box-shadow:0 0 30px #00ffe720,0 0 80px #7b2fff15;
  image-rendering:pixelated;
}

/* SCORE FLOATERS (DOM overlay) */
#floaters { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
.floater {
  position:absolute; font-size:13px; font-weight:bold;
  color:#00ffe7; text-shadow:0 0 8px #00ffe7;
  letter-spacing:2px; white-space:nowrap;
  animation:float-up .9s ease-out forwards;
  pointer-events:none;
}
.floater.enemy { color:#ff4466; text-shadow:0 0 8px #ff4466; }
.floater.gem   { color:#7b2fff; text-shadow:0 0 8px #7b2fff; }
@keyframes float-up {
  0%   { opacity:1; transform:translateY(0) scale(1.2); }
  60%  { opacity:1; transform:translateY(-30px) scale(1); }
  100% { opacity:0; transform:translateY(-55px) scale(.8); }
}

/* STAGE TRANSITION */
#stage-flash {
  position:fixed; inset:0;
  background:#00ffe7;
  opacity:0; pointer-events:none;
  z-index:20;
  transition:opacity .15s;
}
#stage-flash.flash { animation:flash-anim .5s forwards; }
@keyframes flash-anim {
  0%{opacity:.6} 100%{opacity:0}
}

/* ── OVERLAY ──────────────────────────────────── */
#overlay {
  position:fixed; inset:0;
  background:#07070fdd;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; z-index:30;
}

#overlay .sub { color:#aaa; font-size:12px; letter-spacing:3px; }
#overlay .score-line { color:#555; font-size:11px; }
#overlay .score-line span { color:#00ffe7; }
.ov-btn {
  margin-top:8px; padding:9px 36px;
  background:transparent; border:1px solid #00ffe7;
  color:#00ffe7; font-family:'Courier New',monospace; font-size:13px; letter-spacing:4px;
  cursor:pointer; text-shadow:0 0 8px #00ffe7; box-shadow:0 0 12px #00ffe730;
  transition:all .2s;
}
.ov-btn:hover { background:#00ffe720; box-shadow:0 0 28px #00ffe750; }
#overlay.hidden { display:none; }

/* ── CONTROLS HINT ────────────────────────────── */
#ctrl-hint { font-size:10px; color:#333; letter-spacing:2px; }
#ctrl-hint span { color:#00ffe750; }

/* ── MOBILE BUTTONS ───────────────────────────── */
#mob-ctrl { display:none; gap:14px; margin-top:4px; }
.mob-btn {
  width:52px; height:52px;
  background:#00ffe710; border:1px solid #00ffe750; border-radius:8px;

@media(max-width:740px){

  #ctrl-hint { display:none; }

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, dur, vol=0.18, detune=0) {
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq; o.detune.value = detune;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e){}
}

function sfxJump()   { playTone(280,'square',.12,.12); playTone(420,'square',.1,.08,20); }

// ── HUD ───────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('gemsVal').textContent =
    gems.filter(g=>g.collected).length+'/'+gems.length;
  // Lives
  const lb = document.getElementById('lives-bar');
  lb.innerHTML = '';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='heart'+(i>=lives?' lost':'');
    lb.appendChild(d);
  }
  // HP bar
  const pct = Math.max(0, playerHP/maxHP*100);
  const bar = document.getElementById('hp-bar-inner');
  bar.style.width = pct+'%';
  bar.className = 'hp-bar-inner'+(pct<30?' low':'');
}

// Score floater (DOM)
function spawnFloater(worldX, worldY, text, cls='') {
  const el = document.createElement('div');
  el.className = 'floater '+(cls||'');
  el.textContent = text;
  const sx = worldX - camX - 10;
  const sy = worldY;
  el.style.left = sx+'px';
  el.style.top  = sy+'px';
  document.getElementById('floaters').appendChild(el);
  setTimeout(()=>el.remove(), 950);
}

// ── PHYSICS ───────────────────────────────────────────────────
function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function resolveX(obj) {
  for(const p of platforms){
    if(rectOverlap(obj.x,obj.y,obj.w,obj.h,p.x,p.y,p.w,p.h)){
      if(obj.vx>0) obj.x=p.x-obj.w;
      else if(obj.vx<0) obj.x=p.x+p.w;
      obj.vx=0;
    }
  }
}
function resolveY(obj) {
  for(const p of platforms){
    if(rectOverlap(obj.x,obj.y,obj.w,obj.h,p.x,p.y,p.w,p.h)){
      if(obj.vy>0){ obj.y=p.y-obj.h; obj.vy=0; obj.onGround=true; }
      else if(obj.vy<0){ obj.y=p.y+p.h; obj.vy=0; }
    }
  }
}

  if(player.dead){
    player.deathTimer--;
    if(player.deathTimer<=0) respawn();
    return;
  }
  if(player.invincible>0) player.invincible--;

  const lv  = keys['ArrowLeft'] ||keys['a']||mobileKeys.left;
  const rv  = keys['ArrowRight']||keys['d']||mobileKeys.right;
  const jmp = keys['ArrowUp']||keys[' ']||keys['w']||mobileKeys.jump;

  const spd = 3.6;
  if(lv){ player.vx=-spd; player.facingRight=false; }
  else if(rv){ player.vx=spd; player.facingRight=true; }
  else player.vx*=0.78;

  if(jmp && player.onGround && !player.jumpPressed){
    player.vy=-10.5; player.jumpPressed=true; sfxJump();
  }
  if(!jmp) player.jumpPressed=false;

  player.vy+=0.46; if(player.vy>14) player.vy=14;

  player.x+=player.vx;
  player.x=Math.max(0,Math.min(player.x,levelData.levelW-player.w));
  resolveX(player);

  player.onGround=false;
  player.y+=player.vy;
  resolveY(player);

  if(player.y>H+80) die();

  // anim
  player.frameTimer++;
  if(Math.abs(player.vx)>0.4 && player.onGround){
    if(player.frameTimer>7){player.frame=(player.frame+1)%4;player.frameTimer=0;}
  } else if(!player.onGround){ player.frame=2; }
  else { player.frame=0; }
}

function die() {
  if(player.invincible>0||player.dead) return;
  sfxDie();
  lives--; updateHUD();
  player.dead=true; player.deathTimer=70;
  spawnParticles(player.x+player.w/2, player.y+player.h/2, '#00ffe7', 18);
  if(lives<=0){ gameState='gameover'; stopBGM(); showOverlay('遊戲結束','GAME OVER','再試一次',false); }
}

function respawn() {
  player.x=player.respawnX; player.y=player.respawnY;
  player.vx=0; player.vy=0;
  player.dead=false; player.invincible=90;
  playerHP=maxHP; updateHUD();
}

// ── ENEMY UPDATE ──────────────────────────────────────────────
function updateEnemies() {
  for(const e of enemies){
    if(!e.alive){
      e.deathTimer--;
      continue;
    }

    // Aggro check
    const dx = (player.x+player.w/2)-(e.x+e.w/2);
    const dy = (player.y+player.h/2)-(e.y+e.h/2);
    const dist = Math.sqrt(dx*dx+dy*dy);
    e.aggro = (dist < e.aggroRange && !player.dead);

    if(e.aggro){
      // Chase
      const chaseSpd = e.speed * 1.6;
      e.vx = dx > 0 ? chaseSpd : -chaseSpd;
    } else {
      // Patrol
      if(e.x > e.startX + e.patrol) e.vx=-e.speed;
      if(e.x < e.startX)            e.vx= e.speed;
    }

    e.vy+=0.46; if(e.vy>14) e.vy=14;
    e.x+=e.vx;
    resolveX(e);
    e.onGround=false;
    e.y+=e.vy;
    resolveY(e);
    if(e.y>H+80){ e.alive=false; continue; }

    // Face direction
    if(e.vx>0) e.facingRight=true;
    else if(e.vx<0) e.facingRight=false;

    // Anim
    e.frameTimer++;
    if(e.frameTimer>8){e.frame=(e.frame+1)%4;e.frameTimer=0;}

    // Hit player
    if(player.invincible<=0 && !player.dead &&
       rectOverlap(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
      // Check stomp (player falling onto enemy)
      const stomped = player.vy>1 && player.y+player.h < e.y+e.h*0.6;
      if(stomped){
        stompEnemy(e);
      } else {
        hurtPlayer(e);
      }
    }
  }
}

function stompEnemy(e){
  e.alive=false; e.deathTimer=30;
  sfxStomp();
  score+=200; updateHUD();
  spawnParticles(e.x+e.w/2, e.y, e.col, 12);
  spawnFloater(e.x, e.y-20, '+200', 'enemy');
  player.vy=-7; // bounce
}

function hurtPlayer(e){
  sfxHit();
  playerHP-=25;
  player.invincible=80;
  spawnParticles(player.x+player.w/2, player.y+player.h/2, '#ff4466', 8);
  spawnFloater(player.x, player.y-10, '-25 HP', 'enemy');
  if(playerHP<=0){ playerHP=0; die(); }
  updateHUD();
}

// ── GEMS ─────────────────────────────────────────────────────
function checkGems(){
  for(const g of gems){
    if(g.collected) continue;
    const dx=(player.x+player.w/2)-g.x;
    const dy=(player.y+player.h/2)-g.y;
    if(Math.abs(dx)<g.r+13&&Math.abs(dy)<g.r+13){
      g.collected=true;
      score+=100; updateHUD();
      sfxGem();
      spawnParticles(g.x, g.y, g.col, 14);
      spawnFloater(g.x-20, g.y-20, '+100', 'gem');
    }
  }
}

// ── FLAG ─────────────────────────────────────────────────────
function checkFlag(){
  const fl = levelData.flag;
  const fx = fl.tx*TILE, fy = fl.ty*TILE;
  const dx=(player.x+player.w/2)-fx;
  const dy=(player.y+player.h/2)-fy;
  if(Math.abs(dx)<32&&Math.abs(dy)<52){
    const bonus = gems.filter(g=>g.collected).length * 50;
    score += 500 + bonus; updateHUD();
    sfxClear(); stopBGM();
    gameState='levelclear';
    const isLast = (currentLevel===LEVELS.length-1);
    if(isLast){
      setTimeout(()=>showOverlay('全關卡通關！','ALL CLEAR','再玩一次',false),500);
    } else {
      setTimeout(()=>{
        const flash=document.getElementById('stage-flash');
        flash.classList.add('flash');
        setTimeout(()=>{ flash.classList.remove('flash'); },600);
        initLevel(currentLevel+1, true);
        hideOverlay();
      },800);
      showOverlay(`關卡 ${currentLevel+1} 完成`,`STAGE ${currentLevel+1} CLEAR`,'下一關',true);
    }
  }
}

// ── PARTICLES ────────────────────────────────────────────────
function spawnParticles(x,y,col,count){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=1.5+Math.random()*3.5;
    particles.push({
      x,y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd-2,
      col, life:1, decay:0.03+Math.random()*0.03,
      r:2+Math.random()*3
    });
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15;
    p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}

// ── CAMERA ───────────────────────────────────────────────────
function updateCamera(){
  const tx=player.x-W/3;
  camX+=(tx-camX)*0.1;
  camX=Math.max(0,Math.min(camX,levelData.levelW-W));
}

// ── DRAW ─────────────────────────────────────────────────────
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,levelData.bgTop); g.addColorStop(1,levelData.bgBot);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // stars
  for(const s of STARS){
    const sx=((s.x-camX*0.25)%(levelData.levelW)+levelData.levelW)%levelData.levelW;
    if(sx<0||sx>W) continue;
    const flick=0.5+0.5*Math.sin(frameCount*0.04+s.phase);
    ctx.globalAlpha=s.bri*flick*0.7;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(sx,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPlatforms(){
  const ec = levelData.edgeCol;
  for(const p of platforms){
    const px=p.x-camX;
    if(px>W+10||px+p.w<-10) continue;
    // tier colour
    const dy=p.y/TILE;
    const col=dy>=10?levelData.platCol1:dy>=6?levelData.platCol2:levelData.platCol3;
    ctx.fillStyle=col; ctx.fillRect(px,p.y,p.w,p.h);
    // neon edge
    ctx.strokeStyle=ec+'90'; ctx.lineWidth=2;
    ctx.shadowColor=ec; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(px,p.y+1); ctx.lineTo(px+p.w,p.y+1); ctx.stroke();
    ctx.shadowBlur=0;
    // grid lines
    ctx.strokeStyle='#ffffff06'; ctx.lineWidth=1;
    for(let gx=px;gx<px+p.w;gx+=TILE){
      ctx.beginPath(); ctx.moveTo(gx,p.y); ctx.lineTo(gx,p.y+p.h); ctx.stroke();
    }
  }
}

function drawGems(){
  for(const g of gems){
    if(g.collected) continue;
    const gx=g.x-camX;
    if(gx<-20||gx>W+20) continue;
    g.pulse+=0.08;
    const bob=Math.sin(g.pulse)*3;
    ctx.shadowColor=g.col; ctx.shadowBlur=8+Math.sin(g.pulse)*4;
    ctx.fillStyle=g.col;
    ctx.save();
    ctx.translate(gx,g.y+bob);
    ctx.rotate(Math.PI/4+g.pulse*0.25);
    ctx.fillRect(-g.r*.7,-g.r*.7,g.r*1.4,g.r*1.4);
    ctx.restore();
    ctx.shadowBlur=0;
  }
}

function drawFlag(){
  const fx=levelData.flag.tx*TILE-camX;
  const fy=levelData.flag.ty*TILE;
  if(fx<-60||fx>W+60) return;
  ctx.strokeStyle='#aaa'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(fx,fy+40); ctx.lineTo(fx,fy-20); ctx.stroke();
  const wave=Math.sin(frameCount*0.09)*7;
  ctx.fillStyle=levelData.edgeCol;
  ctx.shadowColor=levelData.edgeCol; ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.moveTo(fx,fy-20); ctx.lineTo(fx+24+wave,fy-10);
  ctx.lineTo(fx+20+wave,fy); ctx.lineTo(fx,fy); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
}

function drawEnemies(){
  for(const e of enemies){
    const ex=e.x-camX;
    if(ex<-40||ex>W+40) continue;
    if(!e.alive){
      ctx.globalAlpha=e.deathTimer/30;
      ctx.fillStyle=e.col;
      ctx.save(); ctx.translate(ex+e.w/2,e.y+e.h/2);
      ctx.rotate(frameCount*0.2);
      ctx.fillRect(-8,-8,16,16);
      ctx.restore(); ctx.globalAlpha=1;
      continue;
    }
    ctx.save();
    if(e.vx<0){ ctx.translate(ex+e.w,e.y); ctx.scale(-1,1); }
    else { ctx.translate(ex,e.y); }

    const leg=Math.sin(frameCount*0.35)*5*(Math.abs(e.vx)>0.3?1:0);
    // Legs
    ctx.fillStyle=e.col+'aa';
    ctx.fillRect(2,e.h-9+leg,7,9);
    ctx.fillRect(12,e.h-9-leg,7,9);
    // Body
    ctx.fillStyle=e.col;
    ctx.shadowColor=e.col; ctx.shadowBlur=e.aggro?12:5;
    ctx.fillRect(1,6,e.w-2,e.h-14);
    ctx.shadowBlur=0;
    // Head
    ctx.fillStyle='#220022';
    ctx.fillRect(3,0,e.w-6,10);
    // Eyes (red when aggro)
    ctx.fillStyle=e.aggro?'#ff0000':'#ff6688';
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=e.aggro?8:2;
    ctx.fillRect(5,2,4,4); ctx.fillRect(13,2,4,4);
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

function drawPlayer(){
  const px=player.x-camX, py=player.y;
  if(player.dead) ctx.globalAlpha=0.3+0.7*(player.deathTimer%10>5?1:0);
  else if(player.invincible>0) ctx.globalAlpha=player.invincible%8>4?0.3:1;
  ctx.save();
  if(!player.facingRight){ ctx.translate(px+player.w,py); ctx.scale(-1,1); }
  else { ctx.translate(px,py); }
  const leg=Math.sin(frameCount*0.3)*4*(Math.abs(player.vx)>0.3?1:0);
  // shadow
  ctx.fillStyle='#00ffe718';
  ctx.beginPath(); ctx.ellipse(player.w/2,player.h+4,player.w*.4,4,0,0,Math.PI*2); ctx.fill();
  // legs
  ctx.fillStyle='#7b2fff';
  ctx.fillRect(2,player.h-10+leg,8,10); ctx.fillRect(12,player.h-10-leg,8,10);
  // body
  const bg=ctx.createLinearGradient(0,4,0,player.h-8);
  bg.addColorStop(0,'#00ffe7'); bg.addColorStop(1,'#0080a0');
  ctx.fillStyle=bg; ctx.shadowColor='#00ffe7'; ctx.shadowBlur=8;
  ctx.fillRect(1,8,player.w-2,player.h-16); ctx.shadowBlur=0;
  // head
  ctx.fillStyle='#ffe5c0'; ctx.fillRect(3,0,player.w-6,12);
  // visor
  ctx.fillStyle='#00ffe7'; ctx.globalAlpha*=.9;
  ctx.fillRect(5,3,player.w-10,6);
  ctx.restore(); ctx.globalAlpha=1;
}

function drawParticles(){
  for(const p of particles){
    const px=p.x-camX;
    if(px<-10||px>W+10) continue;
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.shadowColor=p.col; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(px,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawScanlines(){
  ctx.fillStyle='rgba(0,0,0,0.025)';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
}

// ── MAIN LOOP ────────────────────────────────────────────────
function loop(){
  frameCount++;
  if(gameState==='playing'){
    updatePlayer();
    updateEnemies();
    checkGems();
    checkFlag();
    updateParticles();
    updateCamera();
  } else {
    updateParticles(); // keep showing after death
  }
  ctx.clearRect(0,0,W,H);
  drawBG();
  drawPlatforms();
  drawGems();
  drawFlag();
  drawEnemies();
  drawParticles();
  drawPlayer();
  drawScanlines();
  requestAnimationFrame(loop);
}

// ── OVERLAY ──────────────────────────────────────────────────
function showOverlay(zh, en, btnTxt, isNext){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h2>${zh}</h2>
    <div class="sub">${en}</div>
    <div class="score-line">SCORE: <span>${score}</span></div>
    <button class="ov-btn" id="startBtn">▶ ${btnTxt}</button>`;
  ov.classList.remove('hidden');
  document.getElementById('startBtn').onclick=()=>{
    ov.classList.add('hidden');
    if(isNext){ initLevel(currentLevel+1,true); }
    else { initGame(); }
  };
}
function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }

// ── INPUT ────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='r'||e.key==='R'){ hideOverlay(); initGame(); }
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });

function bindMob(id,prop){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{mobileKeys[prop]=true;e.preventDefault();},{passive:false});
  el.addEventListener('touchend',e=>{mobileKeys[prop]=false;e.preventDefault();},{passive:false});
  el.addEventListener('mousedown',()=>mobileKeys[prop]=true);
  el.addEventListener('mouseup',()=>mobileKeys[prop]=false);
}
bindMob('btnLeft','left');
bindMob('btnRight','right');
bindMob('btnJump','jump');

// ── BOOT ─────────────────────────────────────────────────────
document.getElementById('startBtn').onclick=()=>{
  hideOverlay();
  initGame();
  if(!loopStarted){ loopStarted=true; loop(); }
};
</script>
